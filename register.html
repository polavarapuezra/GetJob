{% extends "base.html" %}
{% block title %}Register — GetJob Portal{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">Get<span>Job</span></div>
    <p class="auth-tagline">Your job journey starts here</p>
    <form method="POST" action="{{ url_for('register') }}">
      <div class="mb-3">
        <label class="gj-label">Full Name</label>
        <input type="text" name="name" class="gj-input" placeholder="Ravi Kumar" required />
      </div>
      <div class="mb-3">
        <label class="gj-label">Email Address</label>
        <input type="email" name="email" class="gj-input" placeholder="ravi@example.com" required />
      </div>
      <div class="mb-3">
        <label class="gj-label">Password</label>
        <input type="password" name="password" class="gj-input" placeholder="Min 6 characters" required />
      </div>
      <div class="mb-4">
        <label class="gj-label">Confirm Password</label>
        <input type="password" name="confirm_password" class="gj-input" placeholder="Re-enter password" required />
      </div>
      <button type="submit" class="btn-gj-primary w-100">Create Account</button>
    </form>
    <p class="auth-switch">Already have an account? <a href="{{ url_for('login') }}">Login here</a></p>
  </div>
</div>
{% endblock %}
